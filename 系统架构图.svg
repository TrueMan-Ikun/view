<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 950" width="100%" height="100%">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976D2"/>
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B1FA2"/>
        </marker>
        
        <linearGradient id="bg-openmv" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E3F2FD" />
            <stop offset="100%" stop-color="#BBDEFB" />
        </linearGradient>
        <linearGradient id="bg-stm32" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F3E5F5" />
            <stop offset="100%" stop-color="#E1BEE7" />
        </linearGradient>
        <linearGradient id="bg-hardware" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFF3E0" />
            <stop offset="100%" stop-color="#FFE0B2" />
        </linearGradient>
    </defs>

    <rect width="1100" height="950" fill="#FAFAFA" />

    <rect x="50" y="50" width="1000" height="160" rx="15" fill="url(#bg-openmv)" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#0D47A1">👁️ 前端视觉感知层 (OpenMV) - 边缘侧</text>

    <rect x="80" y="110" width="160" height="70" rx="8" fill="#FFFFFF" stroke="#64B5F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="160" y="142" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">摄像头采集</text>
    <text x="160" y="165" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">实时帧获取</text>

    <rect x="300" y="110" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#64B5F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="142" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">FOMO 模型推理</text>
    <text x="400" y="165" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">轻量级目标质心预测</text>

    <rect x="560" y="110" width="220" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5 5" filter="url(#shadow)"/>
    <text x="670" y="142" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2E7D32" text-anchor="middle">时序置信融合算法 ⭐</text>
    <text x="670" y="165" font-family="sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">过滤闪烁 / 面积一致性判定</text>

    <rect x="840" y="110" width="160" height="70" rx="8" fill="#FFFFFF" stroke="#64B5F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="920" y="142" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">UART 打包发送</text>
    <text x="920" y="165" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">[X, Y, Area, Label]</text>

    <path d="M 240 145 L 290 145" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M 500 145 L 550 145" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M 780 145 L 830 145" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow-blue)"/>


    <path d="M 920 180 L 920 230 L 550 230 L 550 260" fill="none" stroke="#555" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrow)"/>
    <rect x="680" y="215" width="120" height="30" rx="15" fill="#FFF" stroke="#999"/>
    <text x="740" y="235" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">UART 异步通信</text>


    <rect x="50" y="260" width="1000" height="470" rx="15" fill="url(#bg-stm32)" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="295" font-family="sans-serif" font-size="20" font-weight="bold" fill="#4A148C">🧠 后端主控与算法决策层 (STM32F103)</text>

    <rect x="450" y="280" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#BA68C8" stroke-width="2" filter="url(#shadow)"/>
    <text x="550" y="310" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">串口 中断 解析</text>

    <rect x="425" y="370" width="250" height="200" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <text x="550" y="400" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E65100" text-anchor="middle">多态存在性状态机 (FSM) ⭐</text>
    <circle cx="480" cy="450" r="30" fill="#FFCDD2" stroke="#E53935" stroke-width="2"/>
    <text x="480" y="455" font-family="sans-serif" font-size="12" font-weight="bold" fill="#B71C1C" text-anchor="middle">LOST</text>
    <circle cx="550" cy="450" r="30" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2"/>
    <text x="550" y="455" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F57F17" text-anchor="middle">CAND</text>
    <circle cx="620" cy="450" r="30" fill="#C8E6C9" stroke="#43A047" stroke-width="2"/>
    <text x="620" y="455" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle">CONF</text>
    <rect x="500" y="510" width="100" height="40" rx="20" fill="#B3E5FC" stroke="#1E88E5" stroke-width="2"/>
    <text x="550" y="535" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle">HOLD (缓冲)</text>
    <path d="M 505 450 L 515 450" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 575 450 L 585 450" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 620 480 L 580 510" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 520 510 L 480 480" stroke="#E65100" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="80" y="370" width="280" height="200" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <text x="220" y="400" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2E7D32" text-anchor="middle">坐标信号清洗与防震荡链路</text>
    <rect x="100" y="420" width="240" height="35" rx="5" fill="#FFF"/>
    <text x="220" y="443" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">1. 卡尔曼滤波 (Kalman Filter)</text>
    <rect x="100" y="465" width="240" height="35" rx="5" fill="#FFF"/>
    <text x="220" y="488" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">2. XY轴独立低通滤波 (LPF)</text>
    <rect x="100" y="510" width="240" height="35" rx="5" fill="#FFF"/>
    <text x="220" y="533" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">3. 末端指数平滑 (Exp Smooth)</text>

    <rect x="240" y="610" width="280" height="100" rx="10" fill="#FFFFFF" stroke="#9C27B0" stroke-width="2" filter="url(#shadow)"/>
    <text x="380" y="640" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7B1FA2" text-anchor="middle">PID 解算与自愈搜索策略</text>
    <text x="380" y="665" font-family="sans-serif" font-size="14" fill="#666" text-anchor="middle">中心区减速逻辑 / 解锁确认</text>
    <text x="380" y="685" font-family="sans-serif" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">丢失重捕获：局部搜索 -> 扩展搜索</text>

    <rect x="740" y="370" width="280" height="340" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <text x="880" y="400" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1565C0" text-anchor="middle">多模态交互优先级调度器 ⭐</text>
    
    <rect x="760" y="430" width="240" height="70" rx="8" fill="#FFF" stroke="#64B5F6"/>
    <text x="880" y="455" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">1. 防复读静默机制</text>
    <text x="880" y="480" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">2.5秒观察期，降低认知轰炸</text>

    <rect x="760" y="520" width="240" height="70" rx="8" fill="#FFF" stroke="#64B5F6"/>
    <text x="880" y="545" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">2. 软件互斥锁避让 (Mutex)</text>
    <text x="880" y="570" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">语音Busy时，蜂鸣器周期拉长退避</text>

    <rect x="760" y="610" width="240" height="70" rx="8" fill="#FFF" stroke="#64B5F6"/>
    <text x="880" y="635" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">3. 软补偿非语义反馈</text>
    <text x="880" y="660" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">HOLD状态触发 10ms短促嘀嗒重连音</text>

    <path d="M 550 330 L 550 370" stroke="#7B1FA2" stroke-width="3" marker-end="url(#arrow-purple)"/>
    <path d="M 450 305 L 220 305 L 220 370" fill="none" stroke="#7B1FA2" stroke-width="3" marker-end="url(#arrow-purple)"/>
    <path d="M 220 570 L 220 590 L 320 590 L 320 610" fill="none" stroke="#4CAF50" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M 450 570 L 450 610" stroke="#E65100" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M 675 470 L 740 470" stroke="#E65100" stroke-width="3" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
    <path d="M 620 570 L 620 640 L 740 640" fill="none" stroke="#7B1FA2" stroke-width="3" marker-end="url(#arrow-purple)"/>


    <rect x="50" y="760" width="1000" height="150" rx="15" fill="url(#bg-hardware)" stroke="#F57C00" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="795" font-family="sans-serif" font-size="20" font-weight="bold" fill="#E65100">⚙️ 物理执行与人机交互层</text>

    <rect x="120" y="820" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#FFB74D" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="845" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">双轴机械云台</text>
    <text x="210" y="865" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">PWM输出驱动 / 仿生随动</text>

    <rect x="340" y="820" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#FFB74D" stroke-width="2" filter="url(#shadow)"/>
    <text x="430" y="845" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">OLED 显示屏</text>
    <text x="430" y="865" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">模式/状态/坐标 可视化</text>

    <rect x="560" y="820" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#FFB74D" stroke-width="2" filter="url(#shadow)"/>
    <text x="660" y="845" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">DFPlayer 语音模块</text>
    <text x="660" y="865" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">极简三态引导(左/中/右)</text>

    <rect x="800" y="820" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#FFB74D" stroke-width="2" filter="url(#shadow)"/>
    <text x="900" y="845" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">无源蜂鸣器</text>
    <text x="900" y="865" font-family="sans-serif" font-size="13" fill="#666" text-anchor="middle">空间偏差量节拍编码</text>

    <path d="M 380 710 L 380 740 L 210 740 L 210 820" fill="none" stroke="#9C27B0" stroke-width="3" marker-end="url(#arrow-purple)"/>
    <path d="M 600 710 L 600 740 L 430 740 L 430 820" fill="none" stroke="#E65100" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M 880 710 L 880 740 L 660 740 L 660 820" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M 880 710 L 880 740 L 900 740 L 900 820" fill="none" stroke="#1976D2" stroke-width="3" marker-end="url(#arrow-blue)"/>

</svg>
