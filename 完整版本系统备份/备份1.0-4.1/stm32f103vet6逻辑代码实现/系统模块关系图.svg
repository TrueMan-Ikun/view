<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#355070"/>
    </marker>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2a44; }
      .section { font: 700 20px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2a44; }
      .label { font: 600 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2a44; }
      .small { font: 500 13px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #33415c; }
      .box { rx: 18; ry: 18; stroke-width: 2; }
      .line { stroke: #355070; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6c757d; stroke-width: 2.5; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="#f8fafc"/>
  <text x="750" y="48" text-anchor="middle" class="title">室内近距离视障辅助引导系统 模块关系图</text>

  <rect x="40" y="90" width="300" height="810" rx="24" ry="24" fill="#eef6ff" stroke="#8ecae6" stroke-width="2.5"/>
  <text x="190" y="125" text-anchor="middle" class="section">用户输入与感知侧</text>

  <rect class="box" x="70" y="160" width="240" height="110" fill="#ffffff" stroke="#8ecae6"/>
  <text x="190" y="195" text-anchor="middle" class="label">按键输入</text>
  <text x="190" y="224" text-anchor="middle" class="small">PC0: 厕所 / PC1: 安全出口</text>
  <text x="190" y="246" text-anchor="middle" class="small">PE13: 办公室 / PE15: 停止识别</text>

  <rect class="box" x="70" y="300" width="240" height="100" fill="#ffffff" stroke="#8ecae6"/>
  <text x="190" y="335" text-anchor="middle" class="label">语音测试键</text>
  <text x="190" y="363" text-anchor="middle" class="small">PE14: 播放 / 暂停 / 继续</text>

  <rect class="box" x="70" y="430" width="240" height="170" fill="#ffffff" stroke="#8ecae6"/>
  <text x="190" y="465" text-anchor="middle" class="label">OpenMV 脚本</text>
  <text x="190" y="494" text-anchor="middle" class="small">ei_object_detection.py</text>
  <text x="190" y="516" text-anchor="middle" class="small">加载 trained 模型</text>
  <text x="190" y="538" text-anchor="middle" class="small">只识别当前目标类别</text>
  <text x="190" y="560" text-anchor="middle" class="small">FOMO 后处理 + NMS</text>
  <text x="190" y="582" text-anchor="middle" class="small">稳定 3 帧后才发坐标</text>

  <rect class="box" x="70" y="635" width="240" height="130" fill="#ffffff" stroke="#8ecae6"/>
  <text x="190" y="670" text-anchor="middle" class="label">OpenMV 输出</text>
  <text x="190" y="699" text-anchor="middle" class="small">X:123,Y:45  稳定目标坐标</text>
  <text x="190" y="721" text-anchor="middle" class="small">X:-1,Y:-1  未找到或未稳定</text>
  <text x="190" y="743" text-anchor="middle" class="small">UART3 115200</text>

  <rect x="390" y="90" width="760" height="810" rx="24" ry="24" fill="#fff8ed" stroke="#f4a261" stroke-width="2.5"/>
  <text x="770" y="125" text-anchor="middle" class="section">STM32F103VET6 主控核心</text>

  <rect class="box" x="430" y="160" width="280" height="120" fill="#ffffff" stroke="#f4a261"/>
  <text x="570" y="195" text-anchor="middle" class="label">模式管理</text>
  <text x="570" y="224" text-anchor="middle" class="small">保存当前模式</text>
  <text x="570" y="246" text-anchor="middle" class="small">切换后通知 OpenMV</text>
  <text x="570" y="268" text-anchor="middle" class="small">重置搜索与语音状态</text>

  <rect class="box" x="830" y="160" width="280" height="120" fill="#ffffff" stroke="#f4a261"/>
  <text x="970" y="195" text-anchor="middle" class="label">串口通信与解析</text>
  <text x="970" y="224" text-anchor="middle" class="small">USART2 发送 TARGET:n</text>
  <text x="970" y="246" text-anchor="middle" class="small">USART2 接收 X,Y</text>
  <text x="970" y="268" text-anchor="middle" class="small">解析坐标字符串</text>

  <rect class="box" x="430" y="330" width="280" height="145" fill="#ffffff" stroke="#f4a261"/>
  <text x="570" y="365" text-anchor="middle" class="label">目标跟踪控制</text>
  <text x="570" y="394" text-anchor="middle" class="small">坐标滤波</text>
  <text x="570" y="416" text-anchor="middle" class="small">误差计算</text>
  <text x="570" y="438" text-anchor="middle" class="small">X/Y 目标角度更新</text>
  <text x="570" y="460" text-anchor="middle" class="small">平滑驱动舵机</text>

  <rect class="box" x="830" y="330" width="280" height="145" fill="#ffffff" stroke="#f4a261"/>
  <text x="970" y="365" text-anchor="middle" class="label">搜索与丢失处理</text>
  <text x="970" y="394" text-anchor="middle" class="small">切换目标后先等待再搜索</text>
  <text x="970" y="416" text-anchor="middle" class="small">左右往返扫描</text>
  <text x="970" y="438" text-anchor="middle" class="small">丢失计数与时间缓冲</text>
  <text x="970" y="460" text-anchor="middle" class="small">决定是否进入真正丢失流程</text>

  <rect class="box" x="430" y="525" width="280" height="170" fill="#ffffff" stroke="#f4a261"/>
  <text x="570" y="560" text-anchor="middle" class="label">语音状态机</text>
  <text x="570" y="589" text-anchor="middle" class="small">模式切换保护期</text>
  <text x="570" y="611" text-anchor="middle" class="small">搜索 / 已发现 / 丢失 / 名称</text>
  <text x="570" y="633" text-anchor="middle" class="small">避免打断、抢播和重复播报</text>
  <text x="570" y="655" text-anchor="middle" class="small">和 PE14 测试语音隔离</text>
  <text x="570" y="677" text-anchor="middle" class="small">根据 target_valid/search_mode 决策</text>

  <rect class="box" x="830" y="525" width="280" height="170" fill="#ffffff" stroke="#f4a261"/>
  <text x="970" y="560" text-anchor="middle" class="label">显示与状态反馈</text>
  <text x="970" y="589" text-anchor="middle" class="small">OLED 显示模式</text>
  <text x="970" y="611" text-anchor="middle" class="small">显示 X/Y 坐标</text>
  <text x="970" y="633" text-anchor="middle" class="small">显示 TRACKING / No Target</text>
  <text x="970" y="655" text-anchor="middle" class="small">辅助调试与演示</text>

  <rect class="box" x="610" y="740" width="320" height="100" fill="#fff3e6" stroke="#f4a261"/>
  <text x="770" y="775" text-anchor="middle" class="label">主循环调度</text>
  <text x="770" y="803" text-anchor="middle" class="small">按键扫描 -> 串口解析 -> 云台控制 -> 语音更新</text>
  <text x="770" y="825" text-anchor="middle" class="small">整个系统的调度中心在 main.c</text>

  <rect x="1200" y="90" width="260" height="810" rx="24" ry="24" fill="#f1fff4" stroke="#90be6d" stroke-width="2.5"/>
  <text x="1330" y="125" text-anchor="middle" class="section">输出与执行侧</text>

  <rect class="box" x="1230" y="170" width="200" height="120" fill="#ffffff" stroke="#90be6d"/>
  <text x="1330" y="205" text-anchor="middle" class="label">双舵机云台</text>
  <text x="1330" y="234" text-anchor="middle" class="small">TIM2_CH1: X 轴</text>
  <text x="1330" y="256" text-anchor="middle" class="small">TIM2_CH2: Y 轴</text>
  <text x="1330" y="278" text-anchor="middle" class="small">执行搜索与跟踪动作</text>

  <rect class="box" x="1230" y="360" width="200" height="120" fill="#ffffff" stroke="#90be6d"/>
  <text x="1330" y="395" text-anchor="middle" class="label">OLED 显示屏</text>
  <text x="1330" y="424" text-anchor="middle" class="small">I2C1 驱动 SSD1306</text>
  <text x="1330" y="446" text-anchor="middle" class="small">显示模式、坐标、状态</text>

  <rect class="box" x="1230" y="550" width="200" height="165" fill="#ffffff" stroke="#90be6d"/>
  <text x="1330" y="585" text-anchor="middle" class="label">DFPlayer + 喇叭</text>
  <text x="1330" y="614" text-anchor="middle" class="small">USART1 9600</text>
  <text x="1330" y="636" text-anchor="middle" class="small">0001~0007 语音文件</text>
  <text x="1330" y="658" text-anchor="middle" class="small">搜索 / 发现 / 丢失 / 名称</text>
  <text x="1330" y="680" text-anchor="middle" class="small">向用户提供听觉提示</text>

  <path class="line" d="M310 215 C360 215, 380 215, 430 215"/>
  <text x="372" y="200" text-anchor="middle" class="small">GPIO 按键输入</text>

  <path class="line" d="M310 350 C380 350, 390 610, 430 610"/>
  <text x="380" y="372" text-anchor="middle" class="small">测试语音触发</text>

  <path class="line" d="M310 520 C520 520, 700 220, 830 220"/>
  <text x="560" y="502" text-anchor="middle" class="small">UART3 / USART2 数据链路</text>

  <path class="line" d="M710 220 C765 220, 775 220, 830 220"/>
  <text x="770" y="202" text-anchor="middle" class="small">发送 TARGET:n</text>

  <path class="line" d="M970 280 C970 300, 970 308, 970 330"/>
  <path class="line" d="M830 220 C720 220, 630 300, 570 330"/>
  <path class="line" d="M830 220 C785 220, 655 500, 570 525"/>
  <path class="line" d="M710 220 C760 220, 900 495, 970 525"/>

  <path class="line" d="M710 405 C860 405, 1180 230, 1230 230"/>
  <text x="975" y="312" text-anchor="middle" class="small">PWM 控制角度</text>

  <path class="line" d="M1110 405 C1180 405, 1190 230, 1230 230"/>
  <text x="1182" y="315" text-anchor="middle" class="small">搜索扫描控制</text>

  <path class="line" d="M1110 610 C1185 610, 1195 632, 1230 632"/>
  <text x="1186" y="592" text-anchor="middle" class="small">USART1 语音命令</text>

  <path class="line" d="M1110 610 C1170 610, 1185 420, 1230 420"/>
  <text x="1180" y="515" text-anchor="middle" class="small">I2C1 显示更新</text>

  <path class="line" d="M1110 610 C1050 610, 1000 740, 930 790"/>
  <path class="line" d="M710 610 C660 610, 630 740, 610 790"/>
  <path class="line" d="M570 475 C570 500, 570 505, 570 525"/>
  <path class="line" d="M970 475 C970 500, 970 505, 970 525"/>

  <path class="dash" d="M190 700 C310 700, 420 420, 830 420"/>
  <text x="415" y="720" text-anchor="middle" class="small">X:-1,Y:-1 触发搜索或丢失判断</text>

  <path class="dash" d="M190 700 C280 700, 360 405, 430 405"/>
  <text x="320" y="505" text-anchor="middle" class="small">有效坐标驱动跟踪</text>

  <text x="750" y="940" text-anchor="middle" class="small">关键文件：main.c / dfplayer.c / oled.c / 3.26.ioc / ei_object_detection.py</text>
</svg>

