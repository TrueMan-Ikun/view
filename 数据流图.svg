<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 950" width="100%" height="100%">
    <defs>
        <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
        </marker>
        <marker id="arrow-empty" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 8 5 L 0 9 z" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
        </marker>
    </defs>

    <rect width="1450" height="950" fill="#FFFFFF" />

    <rect x="30" y="60" width="300" height="850" rx="0" fill="#FCFCFC" stroke="#000000" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="180" y="100" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000" text-anchor="middle">第一级：视觉感知层 (OpenMV)</text>

    <rect x="360" y="60" width="760" height="850" rx="0" fill="#FCFCFC" stroke="#000000" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="740" y="100" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000" text-anchor="middle">第二级：主控中枢数据分流与决策 (STM32)</text>

    <rect x="1150" y="60" width="270" height="850" rx="0" fill="#FCFCFC" stroke="#000000" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="1285" y="100" font-family="sans-serif" font-size="22" font-weight="bold" fill="#000000" text-anchor="middle">第三级：物理输出与交互</text>

    <rect x="80" y="150" width="200" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="180" y="185" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">CMOS 图像传感器</text>

    <rect x="80" y="300" width="200" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="180" y="335" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">FOMO 模型推理</text>

    <rect x="80" y="450" width="200" height="60" rx="4" fill="#EEEEEE" stroke="#000000" stroke-width="2" />
    <text x="180" y="475" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">轻量级时序融合</text>
    <text x="180" y="495" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(多帧置信/面积一致性判定)</text>

    <rect x="80" y="600" width="200" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="180" y="635" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">UART 打包发送</text>

    <path d="M 180 210 L 180 300" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>


    <path d="M 180 360 L 180 450" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    <text x="190" y="410" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">单帧 BBox (x,y,w,h)</text>

    <path d="M 180 510 L 180 600" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    <text x="190" y="560" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">稳定目标中心 (X,Y,ID)</text>


    <path d="M 280 630 L 400 630" fill="none" stroke="#000000" stroke-width="4" stroke-dasharray="10 4" marker-end="url(#arrow-black)"/>
    <rect x="290" y="590" width="100" height="30" rx="0" fill="#FFFFFF" stroke="#000000"/>
    <text x="340" y="610" font-family="sans-serif" font-size="12" font-weight="bold" fill="#000000" text-anchor="middle">串口字节流</text>


    <rect x="400" y="600" width="160" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="480" y="625" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">中断/DMA 解包</text>
    <text x="480" y="645" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">解析出 (x_err, y_err)</text>

    <rect x="400" y="380" width="160" height="120" rx="4" fill="#E8E8E8" stroke="#000000" stroke-width="3" />
    <text x="480" y="415" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">目标存在性</text>
    <text x="480" y="440" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">状态机 (FSM)</text>
    <rect x="415" y="455" width="130" height="35" rx="0" fill="#FFFFFF" stroke="#000000"/>
    <text x="480" y="477" font-family="sans-serif" font-size="12" fill="#000000" font-weight="bold" text-anchor="middle">LOST/CAND/CONF/HOLD</text>

    <path d="M 480 600 L 480 500" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-empty)"/>
    <text x="490" y="555" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">有效标识</text>

    <path d="M 480 380 L 480 180 L 630 180" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-empty)"/>
    <text x="550" y="170" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">模式分配指令</text>

    <path d="M 560 440 L 630 440" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-empty)"/>
    <text x="580" y="430" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">状态 State</text>

    <path d="M 480 500 L 480 550 L 650 550" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    <text x="580" y="540" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">有效偏差值</text>

    <path d="M 480 600 L 480 320 L 630 320" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    <text x="580" y="310" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">原始坐标误差</text>


    <rect x="650" y="270" width="180" height="100" rx="4" fill="#EEEEEE" stroke="#000000" stroke-width="2" />
    <text x="740" y="300" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">坐标清洗链路</text>
    <text x="740" y="325" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">1. 卡尔曼滤波</text>
    <text x="740" y="340" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">2. 步进低通滤波</text>
    <text x="740" y="355" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">3. 末端指数平滑</text>

    <rect x="650" y="150" width="180" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="740" y="175" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">自动搜索策略</text>
    <text x="740" y="195" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">(局部重捕获/S型扫描)</text>

    <path d="M 830 320 L 890 320" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    <text x="860" y="310" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">平滑误差</text>

    <path d="M 830 180 L 860 180 L 860 270 L 890 270" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    
    <rect x="910" y="250" width="160" height="100" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="990" y="280" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">PID 运动解算</text>
    <text x="990" y="305" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">中心区减速逻辑</text>
    <text x="990" y="325" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">稳态锁定冻结</text>

    <path d="M 1070 300 L 1180 300" fill="none" stroke="#000000" stroke-width="4" marker-end="url(#arrow-black)"/>
    <text x="1125" y="290" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">增量 PWM</text>


    <rect x="650" y="410" width="420" height="420" rx="4" fill="#FAFAFA" stroke="#000000" stroke-width="2" />
    <text x="860" y="440" font-family="sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">多模态优先级调度器 (UI Scheduler)</text>

    <rect x="670" y="470" width="160" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="750" y="495" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">极简语音引擎</text>
    <text x="750" y="515" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(向左/向右/前方)</text>
    
    <path d="M 830 500 L 890 500" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>
    
    <rect x="910" y="470" width="140" height="60" rx="4" fill="#EEEEEE" stroke="#000000" stroke-width="2" />
    <text x="980" y="495" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle">2.5s 静默拦截</text>
    <text x="980" y="515" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">(防止持续复读轰炸)</text>

    <path d="M 1050 500 L 1180 500" fill="none" stroke="#000000" stroke-width="4" marker-end="url(#arrow-black)"/>
    <text x="1115" y="490" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">指令 HEX</text>

    <rect x="670" y="600" width="160" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="750" y="625" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">节拍重编码引擎</text>
    <text x="750" y="645" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(偏差越小，频率越密)</text>

    <path d="M 830 630 L 890 630" fill="none" stroke="#000000" stroke-width="3" marker-end="url(#arrow-black)"/>

    <rect x="910" y="580" width="140" height="100" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="980" y="605" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle">任务互斥锁 (Mutex)</text>
    <text x="980" y="630" font-family="sans-serif" font-size="11" fill="#333333" text-anchor="middle">1. 语音Busy时主动退避</text>
    <text x="980" y="645" font-family="sans-serif" font-size="11" fill="#333333" text-anchor="middle">   (拉长周期至1.5s)</text>
    <text x="980" y="665" font-family="sans-serif" font-size="11" fill="#333333" text-anchor="middle">2. HOLD态触发对焦音</text>

    <path d="M 1050 630 L 1180 630" fill="none" stroke="#000000" stroke-width="4" marker-end="url(#arrow-black)"/>
    <text x="1115" y="620" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">电平反转</text>

    <rect x="670" y="730" width="160" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="750" y="755" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000" text-anchor="middle">OLED 显存更新</text>
    <text x="750" y="775" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(状态/坐标格式化)</text>

    <path d="M 830 760 L 1180 760" fill="none" stroke="#000000" stroke-width="4" marker-end="url(#arrow-black)"/>
    <text x="1005" y="750" font-family="sans-serif" font-size="14" fill="#000000" font-weight="bold">I2C / SPI 数据</text>

    <path d="M 480 440 L 480 500 L 650 500" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-empty)"/>
    <path d="M 480 440 L 480 630 L 650 630" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-empty)"/>
    <path d="M 480 440 L 480 760 L 650 760" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-empty)"/>
    
    <path d="M 980 530 L 980 580" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="2 2" marker-end="url(#arrow-empty)"/>
    <text x="955" y="565" font-family="sans-serif" font-size="10" fill="#000000">Busy信号反馈</text>


    <rect x="1200" y="270" width="180" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="1290" y="295" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">双轴机械云台</text>
    <text x="1290" y="315" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(执行物理纠偏)</text>

    <rect x="1200" y="470" width="180" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="1290" y="495" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">DFPlayer 语音</text>
    <text x="1290" y="515" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(播报导引指令)</text>

    <rect x="1200" y="600" width="180" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="1290" y="625" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">无源蜂鸣器</text>
    <text x="1290" y="645" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(听觉方位代偿)</text>

    <rect x="1200" y="730" width="180" height="60" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <text x="1290" y="755" font-family="sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">OLED 显示屏</text>
    <text x="1290" y="775" font-family="sans-serif" font-size="12" fill="#333333" text-anchor="middle">(用户状态监控)</text>

</svg>
